<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="header">
      <h1 class="header-title">ROCK, PAPER, SCISSORS</h1>
    </div>

    <div class="content">
      <div class="intro-text">
        <h2 class="rule">GAME RULES: THE FIRST TO REACH 5 POINTS WINS!</h2>
        <h3 class="choice-instructions">Make your choice (click one of the buttons below)!</h3>
      </div>

      <div class="score-tracker">
        <div class="player-score">
          <p class="score-title">YOU</p>
          <p id="player-score-place">0</p>
        </div>

        <div class="versus-text">
          <p>VS</p>
        </div>

        <div class="computer-score">
          <p class="score-title">COMPUTER</p>
          <p id="computer-score-display">0</p>
        </div>
      </div>

      <div class="buttons">
        <button id="rock">
          <img class="choice-icon" src="images/rock.png" alt="Rock" />
        </button>
        <button id="paper">
          <img class="choice-icon" src="images/paper.png" alt="Paper" />
        </button>
        <button id="scissors">
          <img class="choice-icon" src="images/scissors.png" alt="Scissors" />
        </button>
      </div>

      <p class="games-won"">GAMES WON: <span id="games-won">0</span></p>
    </div>
  </body>
</html>
